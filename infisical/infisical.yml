apiVersion: v1
kind: Namespace
metadata:
  name: infisical
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: infisical-ca
  namespace: infisical
spec:
  encryptedData:
    client_id: 
    client_secret: 
  template:
    metadata:
      name: infisical-ca
      namespace: infisical
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: infisical
  namespace: infisical
spec:
  encryptedData:
    client_id: 
    client_secret: 
  template:
    metadata:
      name: infisical
      namespace: infisical
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical-dev
  namespace: infisical
spec:
  provider:
    infisical:
      hostAPI: https://diavolo.tail5b1a8.ts.net
      auth:
        universalAuthCredentials:
          clientId:
            name: infisical
            key: client_id
            namespace: infisical
          clientSecret:
            name: infisical
            key: client_secret
            namespace: infisical
      secretsScope:
        projectSlug: cluster
        environmentSlug: dev

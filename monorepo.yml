apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monorepo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/moodyRahman/k8s-monorepo
    path: bootstrap
    targetRevision: HEAD
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

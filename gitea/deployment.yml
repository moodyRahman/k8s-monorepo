apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pg-gitea
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical

  target:
    name: pg-gitea

  data:
    - secretKey: password
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        key: postgres-gitea-password
        metadataPolicy: None	
        nullBytePolicy: Ignore
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-config
data:
  GITEA__database__DB_TYPE: "postgres"
  GITEA__database__HOST: "postgres.data.svc.cluster.local"
  GITEA__database__NAME: "gitea"
  GITEA__database__USER: "gitea"
  GITEA__database__PASSWD__FILE: "/etc/secrets/pg-password"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
spec:
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      containers:
      - name: gitea
        image: docker.gitea.com/gitea:1.26.2-rootless
        ports:
          - containerPort: 3000
          - containerPort: 22
        envFrom:
          - configMapRef:
              name: gitea-config
        volumeMounts:
          - name: psql-password
            mountPath: /etc/secrets
            readOnly: true
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"
      volumes:
        - name: psql-password
          secret:
            secretName: pg-gitea
            items:
              - key: password
                path: pg-password
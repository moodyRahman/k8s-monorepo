apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pg-gitea
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical

  target:
    name: pg-gitea

  data:
    - secretKey: password
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        key: postgres-gitea-password
        metadataPolicy: None	
        nullBytePolicy: Ignore
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-config
data:
  GITEA__database__DB_TYPE: "postgres"
  GITEA__database__HOST: "postgres.data.svc.cluster.local"
  GITEA__database__NAME: "gitea"
  GITEA__database__USER: "gitea"
  GITEA__database__PASSWD__FILE: "/etc/secrets/pg-password"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
spec:
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      containers:
      - name: gitea
        image: docker.gitea.com/gitea:1.26.2-rootless
        ports:
          - containerPort: 3000
          - containerPort: 22
        envFrom:
          - configMapRef:
              name: gitea-config
        volumeMounts:
          - name: psql-password
            mountPath: /etc/secrets
            readOnly: true
          - name: gitea-data
            mountPath: /data
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"
      volumes:
        - name: psql-password
          secret:
            secretName: pg-gitea
            items:
              - key: password
                path: pg-password
        - name: gitea-data
          persistentVolumeClaim:
            claimName: gitea-data
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
spec:
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: ssh
      port: 22
      targetPort: 22
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitea
  annotations:
    cert-manager.io/cluster-issuer: internal-ca
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - git.k8s.moody
      secretName: git-tls

  rules:
    - host: git.k8s.moody
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitea
                port:
                  number: 3000
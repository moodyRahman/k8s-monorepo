apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
spec:
  destination:
    namespace: ''
    server: https://kubernetes.default.svc
  source:
    path: ''
    repoURL: https://github.com/moodyRahman/headlamp-k8s
    targetRevision: HEAD
    directory:
      include: headlamp.yml
  sources: []
  project: default
  syncPolicy:
    automated: null

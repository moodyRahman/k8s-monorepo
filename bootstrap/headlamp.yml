apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
spec:
  project: bootstrap
  sources:
    - repoURL: https://github.com/moodyRahman/k8s-monorepo
      path: headlamp
      targetRevision: HEAD
      directory:
        recurse: true
    - repoURL: https://kubernetes-sigs.github.io/headlamp/
      chart: headlamp
      targetRevision: "*"
      helm:
        releaseName: headlamp
        values: |
          serviceAccount:
            create: false
            name: headlamp-admin
          clusterRoleBinding:
            create: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
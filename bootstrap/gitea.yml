apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
spec:
  project: apps
  sources:
    - repoURL: https://github.com/moodyRahman/k8s-monorepo
      path: ./gitea
      targetRevision: HEAD
      directory:
        recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
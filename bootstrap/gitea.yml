apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://dl.gitea.com/charts
    chart: gitea
    targetRevision: 12.6.0
    helm:
      releaseName: gitea
      # values: |
      #   memcached:
      #     image:
      #       registry: docker.io
      #       repository: bitnami/memcached
      #       tag: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
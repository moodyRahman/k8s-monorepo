apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nfs-subdir-external-provisioner
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
      chart: nfs-subdir-external-provisioner
      targetRevision: "*"   # pin to a specific version e.g. "4.0.18"
      helm:
        values: |
          nfs:
            server: nfs
            path: /srv/nfs/shared
          storageClass:
            defaultClass=true
    # - repoURL: https://github.com/moodyRahman/k8s-monorepo
    #   path: nfs-subdir
    #   targetRevision: HEAD
    #   directory:
    #     recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true